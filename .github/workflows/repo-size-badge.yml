name: Update repository size badge

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate badge
        run: |
          SIZE=$(du -sh . --exclude=.git | cut -f1)

          cat > repo-size.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="180" height="20">
            <rect width="180" height="20" fill="#555"/>
            <text x="90" y="14" fill="white" font-size="11" text-anchor="middle">
              Repository size: $SIZE
            </text>
          </svg>
          EOF

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add repo-size.svg

          git commit -m "Update repository size badge" || exit 0
          git push